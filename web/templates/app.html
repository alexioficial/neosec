<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Neosec Discord</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    </head>
    <body hx-ext="ws" ws-connect="/ws">
        <div class="sidebar">
            <div class="guild-icon-wrapper active" onclick="document.querySelectorAll('.guild-icon-wrapper').forEach(e=>e.classList.remove('active')); this.classList.add('active');">
                <div class="pill"></div>
                <div
                    class="guild-icon home-icon"
                    hx-get="/api/v1/users/@me"
                    hx-target="#main-chat"
                >
                    <svg x="0" y="0" class="icon_e315cc" aria-hidden="true" role="img" xmlns="http://www.w3.org/2000/svg" width="28" height="20" fill="none" viewBox="0 0 28 20"><path fill="currentColor" d="M23.0212 1.67671C21.3107 0.879656 19.5079 0.318797 17.6584 0C17.4062 0.461742 17.1749 0.934541 16.9708 1.4184C15.003 1.12145 12.9974 1.12145 11.0283 1.4184C10.819 0.934541 10.589 0.461742 10.3368 0C8.48074 0.318797 6.6845 0.879656 4.97405 1.67671C1.56727 6.77853 0.649666 11.7538 1.11108 16.652C3.10102 18.1418 5.3262 19.2743 7.69177 20C8.22338 19.2743 8.69519 18.4993 9.09812 17.691C8.32996 17.4013 7.58522 17.0424 6.87684 16.6135C7.06531 16.4762 7.24726 16.3387 7.42403 16.1847C11.5911 18.1749 16.408 18.1749 20.5763 16.1847C20.7531 16.3332 20.9351 16.4762 21.1171 16.6135C20.41 17.0369 19.6639 17.4013 18.897 17.691C19.3052 18.4993 19.7718 19.2689 20.3082 20C22.6685 19.2743 24.899 18.1418 26.8836 16.652C27.4304 10.9731 25.9665 6.04728 23.0212 1.67671ZM9.68041 13.6383C8.39754 13.6383 7.34085 12.4453 7.34085 10.994C7.34085 9.54272 8.37155 8.34973 9.68041 8.34973C10.9893 8.34973 12.0395 9.54272 12.0187 10.994C12.0187 12.4453 10.9828 13.6383 9.68041 13.6383ZM18.3161 13.6383C17.0332 13.6383 15.9765 12.4453 15.9765 10.994C15.9765 9.54272 17.0072 8.34973 18.3161 8.34973C19.625 8.34973 20.6751 9.54272 20.6543 10.994C20.6543 12.4453 19.625 13.6383 18.3161 13.6383Z"></path></svg>
                </div>
            </div>
            
            <div class="separator"></div>

            <!-- Servers -->
            {{range .Guilds}}
            <div class="guild-icon-wrapper" onclick="document.querySelectorAll('.guild-icon-wrapper').forEach(e=>e.classList.remove('active')); this.classList.add('active');">
                <div class="pill"></div>
                <div
                    class="guild-icon"
                    hx-get="/api/v1/guilds/{{.ID.Hex}}/channels"
                    hx-target="#channels-container"
                    hx-swap="innerHTML"
                    title="{{.Name}}"
                >
                    <img src="{{.Icon}}" alt="{{.Name}}" onerror="this.style.display='none'; this.parentNode.innerHTML='{{slice .Name 0 1}}'"/>
                </div>
            </div>
            {{end}}

            <div class="guild-icon-wrapper">
                <div class="create-guild" onclick="document.getElementById('create-guild-modal').classList.add('active')" title="Add a Server">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M13 5a1 1 0 1 0-2 0v6H5a1 1 0 1 0 0 2h6v6a1 1 0 1 0 2 0v-6h6a1 1 0 1 0 0-2h-6V5Z"></path></svg>
                </div>
            </div>
            <div id="new-guilds"></div>
        </div>

        <div class="channels-sidebar">
            <div id="channels-container">
                <div style="padding: 16px; color: var(--text-muted); text-align: center; font-weight: 500; font-size: 15px; margin-top: 50%;">
                    Select a server
                </div>
            </div>
            
            <div class="user-panel">
                <a href="/logout" class="user-panel-profile" title="Click to logout">
                    <div class="user-avatar-wrapper">
                        <img src="{{.User.Avatar}}" alt="{{.User.Username}}" />
                        <div class="status-indicator"></div>
                    </div>
                    <div class="user-panel-info">
                        <span class="user-panel-name">{{.User.Username}}</span>
                        <span class="user-panel-status">Online</span>
                    </div>
                </a>
                <div class="user-panel-actions">
                    <div class="action-icon" title="Mute">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.43 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"></path></svg>
                    </div>
                    <div class="action-icon" title="Deafen">
                        <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z"></path></svg>
                    </div>
                    <div class="action-icon" title="User Settings">
                        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.3-.06.62-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-chat" id="main-chat">
            <div style="display: flex; justify-content: center; align-items: center; height: 100%; color: var(--text-muted); font-weight: 500; font-size: 16px;">
                Select a channel to start chatting
            </div>
        </div>

        <!-- Create Guild Modal -->
        <div class="modal" id="create-guild-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Customize your server</h2>
                    <p>Give your new server a personality with a name and an icon. You can always change it later.</p>
                </div>
                <form
                    hx-post="/api/v1/guilds"
                    hx-target="#new-guilds"
                    hx-swap="beforeend"
                    onsubmit="
                        event.preventDefault();
                        setTimeout(() => {
                            document.getElementById('create-guild-modal').classList.remove('active');
                            this.reset();
                        }, 50);
                    "
                >
                    <div class="modal-body">
                        <label>Server Name <span class="required" style="color:var(--danger)">*</span></label>
                        <input type="text" name="name" required placeholder="User's server"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel" onclick="document.getElementById('create-guild-modal').classList.remove('active')">Back</button>
                        <button type="submit" class="btn-create">Create</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            window.currentChannelID = null;
            function connectWS() {
                var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
                var wsURL = protocol + "//" + window.location.host + "/ws";
                window.wsConn = new WebSocket(wsURL);

                window.wsConn.onopen = function () {
                    console.log("WebSocket connected");
                    if (window.currentChannelID) {
                        window.wsConn.send(JSON.stringify({
                                type: "subscribe",
                                channel_id: window.currentChannelID,
                            }));
                    }
                };

                window.wsConn.onmessage = function (evt) {
                    var msg = JSON.parse(evt.data);
                    if (msg.channel_id === window.currentChannelID) {
                        var messagesDiv = document.getElementById("chat-messages");
                        if (messagesDiv) {
                            var myID = "{{.User.ID.Hex}}";
                            
                            var authorName = msg.author ? msg.author.username : "Unknown";
                            var authorAvatar = msg.author ? msg.author.avatar : "https://ui-avatars.com/api/?name=U";

                            var d = new Date(msg.created_at);
                            var dateStr = d.toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" }) +
                                " " + d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
                            var timeStr = d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");

                            var newMsg = document.createElement("div");
                            newMsg.className = "message message-first";
                            newMsg.innerHTML = 
                                '<img src="' + authorAvatar + '" alt="avatar" class="message-avatar">' +
                                '<div class="message-content">' +
                                    '<div class="message-header">' +
                                        '<span class="message-author">' + authorName + '</span>' +
                                        '<span class="message-time">' + dateStr + '</span>' +
                                    '</div>' +
                                    '<div class="message-text">' + msg.content + '</div>' +
                                '</div>' + 
                                '<div class="message-compact">' + timeStr + '</div>';
                                
                            messagesDiv.appendChild(newMsg);
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }
                    }
                };

                window.wsConn.onclose = function () {
                    console.log("WebSocket disconnected, reconnecting...");
                    setTimeout(connectWS, 1000);
                };
            }
            connectWS();
        </script>
    </body>
</html>
