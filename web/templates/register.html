<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Neosec - Register</title>
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body class="auth-page">
        <div class="auth-container">
            <h2>Create an account</h2>
            <br/>
            <form
                hx-post="/api/v1/auth/register"
                hx-target="#error-msg"
                onsubmit="event.preventDefault()"
            >
                <div class="form-group">
                    <label>What should everyone call you?</label>
                    <input type="text" name="username" required />
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" required />
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" name="password" required />
                </div>
                <div id="error-msg"></div>
                <button type="submit" class="btn primary">Continue</button>
            </form>
            <p class="switch-auth">
                <a href="/login">Already have an account?</a>
            </p>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 16px; text-align: left;">
                By registering, you agree to Neosec's <a href="#" style="color: var(--text-link); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--text-link); text-decoration: none;">Privacy Policy</a>.
            </p>
        </div>
    </body>
</html>
