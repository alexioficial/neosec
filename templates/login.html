<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NeoSec - Login</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-color: #313338;
            --panel-color: #2b2d31;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --primary: #5865F2;
            --primary-hover: #4752C4;
            --input-bg: #1e1f22;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-normal);
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: var(--panel-color);
            padding: 32px;
            border-radius: 8px;
            width: 480px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,.2);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #f2f3f5;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 16px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: none;
            border-radius: 3px;
            color: var(--text-normal);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border: 1px solid var(--primary);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        .error {
            color: #fa777c;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>¡Hola de nuevo!</h1>
        <div class="subtitle">Nos alegra verte de nuevo.</div>
        <form hx-post="/login" hx-target="#error-msg">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" name="action" value="login">Iniciar Sesión</button>
            <button type="submit" name="action" value="register" style="background-color: #4e5058;">Registrarse</button>
            <div id="error-msg" class="error"></div>
        </form>
    </div>
</body>
</html>
