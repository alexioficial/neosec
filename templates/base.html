{{define "base"}}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{block "title" .}}NeoSec{{end}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {{block "head" .}}{{end}}
    <style>
        :root {
            --bg-color: #313338;
            --panel-color: #2b2d31;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --primary: #5865F2;
            --primary-hover: #4752C4;
            --input-bg: #1e1f22;

            /* Index specific */
            --servers-bg: #1e1f22;
            --channels-bg: #2b2d31;
            --chat-bg: #313338;
            --members-bg: #2b2d31;
            --divider: #3f4147;
            --hover-bg: #35373c;
        }
        body, html {
            background-color: var(--bg-color);
            color: var(--text-normal);
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        /* Login & Register Box Styles */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: var(--panel-color);
            padding: 32px;
            border-radius: 8px;
            width: 480px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,.2);
            text-align: center;
            box-sizing: border-box;
        }
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #f2f3f5;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 16px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: none;
            border-radius: 3px;
            color: var(--text-normal);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        .input-group input:focus {
            border: 1px solid var(--primary);
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        .login-box button:hover {
            background-color: var(--primary-hover);
        }
        .login-box .secondary-btn {
            background-color: #4e5058;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            text-align: center;
        }
        .login-box .secondary-btn:hover {
            background-color: #6d6f78;
        }
        .error {
            color: #fa777c;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Index styles */
        .index-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .servers {
            width: 72px;
            background-color: var(--servers-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            overflow-y: auto;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            background-color: var(--chat-bg);
            border-radius: 24px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-radius 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-normal);
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            overflow: hidden;
            flex-shrink: 0;
        }
        .server-icon:hover, .server-icon.active {
            border-radius: 16px;
            background-color: var(--primary);
            color: white;
        }
        .divider {
            width: 32px;
            height: 2px;
            background-color: var(--divider);
            margin-bottom: 8px;
            border-radius: 1px;
            flex-shrink: 0;
        }
        .channels {
            width: 240px;
            background-color: var(--channels-bg);
            display: flex;
            flex-direction: column;
        }
        .channels-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }
        .channel-list {
            padding: 16px 8px;
            flex: 1;
            overflow-y: auto;
        }
        .channel-item {
            padding: 6px 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .channel-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-normal);
        }
        .channel-item.active {
            background-color: rgba(255, 255, 255, 0.06);
            color: white;
        }
        .channel-hash {
            font-size: 20px;
            margin-right: 6px;
            color: var(--text-muted);
        }
        .user-panel {
            height: 52px;
            background-color: #232428;
            display: flex;
            align-items: center;
            padding: 0 8px;
            justify-content: space-between;
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary);
            margin-right: 8px;
        }
        .logout-btn, .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }
        .logout-btn:hover {
            color: #fa777c;
        }
        .action-btn:hover {
            color: white;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
        }
        .chat-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            z-index: 2;
            border-bottom: 1px solid var(--divider);
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
        }
        .message-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 4px;
        }
        .message-author {
            font-weight: 500;
            color: white;
            margin-right: 8px;
        }
        .message-timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }
        .message-content {
            color: var(--text-normal);
            line-height: 1.375rem;
            word-wrap: break-word;
        }
        .input-area {
            padding: 0 16px 24px 16px;
        }
        .message-input-form {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 0 16px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-normal);
            padding: 11px 0;
            font-size: 16px;
            outline: none;
        }
        .members {
            width: 240px;
            background-color: var(--members-bg);
            padding: 24px 16px;
        }
        .members-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        dialog {
            background: var(--panel-color);
            color: var(--text-normal);
            border: none;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 400px;
        }
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
        }
        dialog h2 {
            margin-top: 0;
            color: white;
            text-align: center;
        }
        dialog label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
        dialog input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: var(--input-bg);
            color: white;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        dialog input:focus {
            border: 1px solid var(--primary);
        }
        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .dialog-btn {
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
        }
        .dialog-btn.primary {
            background: var(--primary);
        }
        .dialog-btn.primary:hover {
            background: #4752c4;
        }
    </style>
</head>
<body {{block "bodyattrs" .}}{{end}}>
    {{template "content" .}}
</body>
</html>
{{end}}
