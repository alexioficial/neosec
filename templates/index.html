<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NeoSec - Discord Clone</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    <style>
        :root {
            --servers-bg: #1e1f22;
            --channels-bg: #2b2d31;
            --chat-bg: #313338;
            --members-bg: #2b2d31;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --divider: #3f4147;
            --primary: #5865F2;
            --hover-bg: #35373c;
            --input-bg: #383a40;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text-normal);
            background-color: var(--chat-bg);
            overflow: hidden;
        }
        .servers {
            width: 72px;
            background-color: var(--servers-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            background-color: var(--chat-bg);
            border-radius: 24px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-radius 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-normal);
            font-weight: bold;
        }
        .server-icon:hover, .server-icon.active {
            border-radius: 16px;
            background-color: var(--primary);
            color: white;
        }
        .divider {
            width: 32px;
            height: 2px;
            background-color: var(--divider);
            margin-bottom: 8px;
            border-radius: 1px;
        }
        .channels {
            width: 240px;
            background-color: var(--channels-bg);
            display: flex;
            flex-direction: column;
        }
        .channels-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .channel-list {
            padding: 16px 8px;
            flex: 1;
            overflow-y: auto;
        }
        .channel-item {
            padding: 6px 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .channel-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-normal);
        }
        .channel-item.active {
            background-color: rgba(255,255,255,0.06);
            color: white;
        }
        .channel-hash {
            font-size: 20px;
            margin-right: 6px;
            color: var(--text-muted);
        }
        .user-panel {
            height: 52px;
            background-color: #232428;
            display: flex;
            align-items: center;
            padding: 0 8px;
            justify-content: space-between;
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary);
            margin-right: 8px;
        }
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }
        .logout-btn:hover {
            color: #fa777c;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
        }
        .chat-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            z-index: 2;
            border-bottom: 1px solid var(--divider);
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
        }
        .message-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 4px;
        }
        .message-author {
            font-weight: 500;
            color: white;
            margin-right: 8px;
        }
        .message-timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }
        .message-content {
            color: var(--text-normal);
            line-height: 1.375rem;
            word-wrap: break-word;
        }
        .input-area {
            padding: 0 16px 24px 16px;
        }
        .message-input-form {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 0 16px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-normal);
            padding: 11px 0;
            font-size: 16px;
            outline: none;
        }
        .members {
            width: 240px;
            background-color: var(--members-bg);
            padding: 24px 16px;
        }
        .members-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
    </style>
</head>
<body hx-ext="ws" ws-connect="/ws">
    <div class="servers">
        <div class="server-icon active">NS</div>
        <div class="divider"></div>
        <div class="server-icon" style="background-color: #313338; color: #23a559;">+</div>
    </div>

    <div class="channels">
        <div class="channels-header">NeoSec Server</div>
        <div class="channel-list">
            <div class="channel-item active">
                <span class="channel-hash">#</span> general
            </div>
            <div class="channel-item">
                <span class="channel-hash">#</span> desarrollo
            </div>
        </div>
        <div class="user-panel">
            <div class="user-info">
                <div class="avatar"></div>
                <div>{{.Username}}</div>
            </div>
            <button hx-post="/logout" class="logout-btn" title="Cerrar sesión">🚪</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span class="channel-hash">#</span> general
        </div>
        <div class="messages-container" id="chat-messages">
            {{range .Messages}}
            <div class="message">
                <div class="message-header">
                    <span class="message-author">{{.Username}}</span>
                    <span class="message-timestamp">{{.CreatedAt.Time.Format "15:04"}}</span>
                </div>
                <div class="message-content">{{.Content}}</div>
            </div>
            {{end}}
        </div>
        <div class="input-area">
            <form ws-send class="message-input-form" onsubmit="setTimeout(() => { this.reset(); document.querySelector('.messages-container').scrollTop = document.querySelector('.messages-container').scrollHeight; }, 10)">
                <input type="text" name="chat_message" class="message-input" placeholder="Enviar mensaje a #general" autocomplete="off" autofocus>
            </form>
        </div>
    </div>

    <div class="members">
        <div class="members-header">En línea</div>
        <div class="channel-item" style="padding: 6px 0;">
            <div class="avatar" style="width: 32px; height: 32px; margin-right: 12px;"></div>
            {{.Username}}
        </div>
    </div>

    <script>
        const container = document.querySelector('.messages-container');
        if(container) container.scrollTop = container.scrollHeight;

        document.body.addEventListener('htmx:wsAfterMessage', function(e) {
            const container = document.querySelector('.messages-container');
            if(container) container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
